name: Build macOS

on:
  # 支持在 GitHub Actions 界面手动点击运行
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型 (release/debug)'
        required: true
        default: 'release'
  # 也可以配置在推送到 main 分支时自动触发
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'lib/**'
  #     - 'macos/**'
  #     - 'pubspec.yaml'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          flutter pub get
          cd macos && pod install && cd ..

      # 关键修复：解决 .env 文件缺失导致打包失败的问题
      - name: Create placeholder .env
        run: touch .env

      - name: Build macOS App
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            flutter build macos --debug
          else
            flutter build macos --release
          fi

      # 将构建出的 .app 打包成 .zip
      - name: Compress Build Output
        run: |
          # 1. 查找生成的 .app 路径（避免因为项目名不同导致的路径差异）
          APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1)
          echo "Found App at: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find .app file!"
            exit 1
          fi

          # 2. 切换到该目录下进行压缩，这样 zip 包内不会包含冗长的 build/macos/... 文件夹层级
          # 我们把压缩包直接输出到 GitHub 的工作根目录 (${{ github.workspace }})
          cd "$(dirname "$APP_PATH")"
          zip -r "${{ github.workspace }}/Flutter-MacOS-App.zip" "$(basename "$APP_PATH")"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-app
          path: Flutter-MacOS-App.zip
          # 加上这个可以确保如果文件缺失，构建会直接报错显现出来
          if-no-files-found: error

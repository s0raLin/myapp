name: Build macOS

on:
  # 支持在 GitHub Actions 界面手动点击运行
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型 (release/debug)'
        required: true
        default: 'release'
  # 也可以配置在推送到 main 分支时自动触发
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'lib/**'
  #     - 'macos/**'
  #     - 'pubspec.yaml'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          flutter pub get
          cd macos && pod install && cd ..

      - name: Build macOS App
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            flutter build macos --debug
          else
            flutter build macos --release
          fi

      # 将构建出的 .app 打包成 .zip 方便下载
      - name: Compress Build Output
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../Flutter-MacOS-App.zip *.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-app
          path: Flutter-MacOS-App.zip

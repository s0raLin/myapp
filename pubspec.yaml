name: myapp
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.2.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  image_picker: ^1.1.2
  file_picker: ^11.0.2
  mime: ^2.0.0
  carousel_slider: ^5.1.2
  lrc_parser: ^0.0.1
  audiotags: ^1.4.5
  google_fonts: ^8.0.2
  just_audio: ^0.10.5
  rxdart: ^0.28.0
  just_audio_media_kit: ^2.1.0

  media_kit_libs_linux: any
  media_kit_libs_windows_audio: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - lib/assets/
    - lib/assets/images/
  fonts:
    - family: NiShiKiFont
      fonts:
        - asset: lib/assets/fonts/nishiki-teki.ttf
